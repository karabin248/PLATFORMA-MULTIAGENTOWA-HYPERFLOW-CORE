kind = "web"
previewPath = "/operator-panel/"
title = "Operator Panel"
version = "1.0.0"
id = "artifacts/operator-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/operator-panel/" ]
localPort = 24224

[services.development]
run = "pnpm --filter @workspace/operator-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/operator-panel", "run", "build" ]
publicDir = "artifacts/operator-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24224"
BASE_PATH = "/operator-panel/"
