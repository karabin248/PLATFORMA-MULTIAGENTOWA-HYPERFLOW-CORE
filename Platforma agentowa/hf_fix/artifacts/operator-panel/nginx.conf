# Operator Panel nginx config — SPA fallback + API reverse proxy.
# Used by artifacts/operator-panel/Dockerfile; referenced from docker-compose.yml.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression for text assets
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/x-javascript text/xml application/xml image/svg+xml;

  # Hashed static assets can be cached aggressively (Vite emits content hashes)
  location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API calls are reverse-proxied to the api-server service.
  # Hostname `api-server` resolves inside the docker-compose network.
  location /api/ {
    proxy_pass http://api-server:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: any path that isn't a file falls back to index.html so that
  # client-side routing (wouter) handles the URL.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
