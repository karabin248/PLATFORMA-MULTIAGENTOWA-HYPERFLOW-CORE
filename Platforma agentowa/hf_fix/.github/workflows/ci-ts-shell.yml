name: TypeScript Shell CI

on:
  push:
    paths:
      - 'artifacts/api-server/**'
      - 'artifacts/operator-panel/**'
      - 'lib/**'
      - 'packages/**'
      - 'scripts/generate_provenance_manifest.py'
  pull_request:
    paths:
      - 'artifacts/api-server/**'
      - 'artifacts/operator-panel/**'
      - 'lib/**'
      - 'packages/**'
      - 'scripts/generate_provenance_manifest.py'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 9.15.4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck API Server
        run: pnpm --filter @workspace/api-server run typecheck
      - name: Typecheck Operator Panel
        run: pnpm --filter @workspace/operator-panel run typecheck
      - name: Run merged-system integration tests
        run: pnpm --filter @workspace/api-server run test:integration
      - name: Generate API server SBOM
        run: |
          cd artifacts/api-server
          mkdir -p dist
          pnpm dlx @cyclonedx/cyclonedx-npm@4.2.1 --output-format json --output-file dist/api-server-sbom.json
      - name: Generate API server provenance manifest
        run: |
          python3 scripts/generate_provenance_manifest.py \
            --component api-server \
            --output-dir artifacts/api-server/dist \
            --output-file artifacts/api-server/dist/api-server-provenance.json
      - name: Upload API server artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: api-server-verification-artifacts
          path: |
            artifacts/api-server/dist/
