name: Python Core CI

on:
  push:
    paths:
      - 'artifacts/hyperflow-core/**'
      - 'scripts/generate_provenance_manifest.py'
      - 'scripts/generate_uv_sbom.py'
  pull_request:
    paths:
      - 'artifacts/hyperflow-core/**'
      - 'scripts/generate_provenance_manifest.py'
      - 'scripts/generate_uv_sbom.py'

permissions:
  contents: read

defaults:
  run:
    working-directory: artifacts/hyperflow-core

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Assert storage files are not tracked (HIGH-01 guard)
        # M-3 fix: guard now checks the correct root-level storage/ path.
        # Previous version checked artifacts/hyperflow-core/storage/ which
        # does not exist — making the guard silently non-functional.
        run: |
          if git ls-files | grep -q "^storage/knowledge_store\.jsonl$"; then
            echo "ERROR: storage/knowledge_store.jsonl is tracked in git." \
                 "Run: git rm --cached storage/knowledge_store.jsonl" && exit 1
          fi
          if git ls-files | grep -q "^storage/traces\.jsonl$"; then
            echo "ERROR: storage/traces.jsonl is tracked in git." \
                 "Run: git rm --cached storage/traces.jsonl" && exit 1
          fi
          echo "Storage contamination check passed."
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.0.1 setuptools==80.10.2 wheel==0.45.1
          pip install -r requirements-ci.txt
          pip install -e .
      - name: Run tests
        run: make test
      - name: Canonical semantics check
        run: make canonical-check
      - name: Release verify
        run: make release-verify

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.11'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip==25.0.1 setuptools==80.10.2 wheel==0.45.1
          pip install -r requirements-ci.txt
          pip install -e .
      - name: Build artifacts
        run: make build
      - name: Packaging smoke
        run: make packaging-smoke
      - name: Generate Python SBOM
        run: |
          mkdir -p dist
          python -m pip list --format=json > dist/python-installed-packages.json
          python3 ../../scripts/generate_uv_sbom.py --pip-list-json dist/python-installed-packages.json --component hyperflow-python-core --output dist/hyperflow-python-sbom.json
      - name: Generate Python provenance manifest
        run: |
          python3 ../../scripts/generate_provenance_manifest.py \
            --component hyperflow-python-core \
            --output-dir dist \
            --output-file dist/hyperflow-python-provenance.json
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hyperflow-dist
          path: artifacts/hyperflow-core/dist/
